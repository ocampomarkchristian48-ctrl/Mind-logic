<!DOCTYPE html>
<html>
<head>
<title>Mind Logic</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<!-- Neon Title -->
<h1 class="title neon">MIND LOGIC</h1>

<!-- START SCREEN -->
<div id="startScreen">
<button class="startBtn neonBtn" onclick="showLanguage()">START GAME</button>
</div>

<!-- LANGUAGE -->
<div id="languageScreen" class="hidden">
<h2 class="neon">Select Language</h2>
<div class="langBox">
<button class="neonBtn" onclick="setLanguage('en')">English</button>
<button class="neonBtn" onclick="setLanguage('tl')">Tagalog</button>
</div>
</div>

<!-- NAME INPUT -->
<div id="nameScreen" class="hidden">
<h2 class="neon">Enter Your Name</h2>
<input type="text" id="playerName" placeholder="Your name">
<br>
<button class="neonBtn" onclick="showDifficulty()">Play</button>
</div>

<!-- DIFFICULTY -->
<div id="difficultyScreen" class="hidden">
<h2 class="neon">Select Difficulty</h2>
<button class="neonBtn" onclick="startGame('easy')">Easy (5)</button>
<button class="neonBtn" onclick="startGame('normal')">Normal (7)</button>
<button class="neonBtn" onclick="startGame('hard')">Hard (10)</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="hidden">
<h2 id="welcome" class="neon"></h2>
<p id="question" class="neon"></p>
<div id="choices"></div>
<p class="neon">Score: <span id="score">0</span></p>
<p class="neon">Question: <span id="number">1</span></p>
<p class="neon">Time Left: <span id="timer">30</span>s</p>
</div>

<!-- RESULT SCREEN -->
<div id="resultScreen" class="hidden">
<h2 class="neon">Game Over</h2>
<p id="finalScore" class="neon"></p>
<p id="playerResult" class="neon"></p>
</div>

<script src="script.js"></script>
</body>
</html>
